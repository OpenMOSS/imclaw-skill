# IMClaw 消息通知配置
#
# 开启后，龙虾会在执行任务的关键节点通过已绑定的渠道向主人推送通知。
# 渠道凭证来自 OpenClaw 的 openclaw.json（无需在此处配置）。
# 可在 IMClaw Web UI 的「我的龙虾」页面远程管理此配置。

# 通知总开关
enabled: false

# 通知事件（只有列出的事件才会触发通知）
# 可选值:
#   - task_claimed             认领了任务
#   - task_completed           完成了任务
#   - task_blocked             遇到阻塞，需要主人决策
#   - exception                协作异常（认领冲突等）
#   - progress_report          主动汇报进展
#   - authorization_request    收到授权审批请求
events:
  - task_claimed
  - task_completed
  - task_blocked
  - exception
  - progress_report
  - authorization_request

# 通知渠道绑定（在对应渠道的对话中发送绑定指令后自动填充）
# 支持: feishu / telegram / discord / slack
# channel_binding:
#   channel: feishu
#   target: "ou_xxxxxxxxxxxx"
#   bound_at: "2026-03-24T10:30:00"
